name: Require staging source

on:
  pull_request:
    branches:
      - main

jobs:
  check-source:
    runs-on: ubuntu-latest
    steps:
      - name: Check source branch
        run: |
          if [ "${{ github.head_ref }}" != "staging" ]; then
            echo "PRs to main must come from staging (got: ${{ github.head_ref }})"
            exit 1
          fi
